<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3 💗</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(-45deg, #fce4ec, #f3e5f5, #e1bee7, #f8bbd0);
  background-size: 400% 400%;
  animation: gradient 12s ease infinite;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.envelope {
  width: 200px;
  height: 120px;
  background: #fff;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.6s;
}

.envelope:before {
  content: "";
  position: absolute;
  top: -60px;
  left: 0;
  width: 0;
  height: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid #fff;
  transition: 0.6s;
}

.envelope.open:before {
  transform: rotateX(180deg);
  transform-origin: top;
}

.message {
  opacity: 0;
  transition: 1s;
  margin-top: 20px;
  font-size: 20px;
  color: #6a1b9a;
}

.show {
  opacity: 1;
}

.flower {
  position: absolute;
  top: -20px;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

.heart {
  position: absolute;
  color: #e91e63;
  animation: pop 1s forwards;
}

@keyframes pop {
  0% {opacity:1; transform: scale(1);}
  100% {opacity:0; transform: scale(2) translateY(-50px);}
}
</style>
</head>

<body>

<div class="center">
  <div class="envelope" onclick="openLetter()"></div>
  <div class="message" id="text"></div>
</div>

<script>
// ====== Hoa rơi ======
function createFlower() {
  const flower = document.createElement("div");
  flower.classList.add("flower");
  flower.innerHTML = "🌸";
  flower.style.left = Math.random() * 100 + "vw";
  flower.style.animationDuration = (Math.random() * 5 + 5) + "s";
  document.body.appendChild(flower);
  setTimeout(() => flower.remove(), 10000);
}
setInterval(createFlower, 300);

// ====== Mở thư + chữ gõ ======
const lines = [
  "Chúc em 8/3 thật dịu dàng 🌷",
  "Cảm ơn vì đã xuất hiện trong cuộc sống anh.",
  "Anh không có ảnh chung để khoe.",
  "Nhưng anh có những khoảnh khắc nghĩ về em.",
  "Và nếu được phép...",
  "Anh muốn là người làm em hạnh phúc 💗"
];

function typeEffect(element, text, speed, callback) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if (callback) {
      setTimeout(callback, 800);
    }
  }
  typing();
}

function openLetter() {
  document.querySelector(".envelope").classList.add("open");
  const textDiv = document.getElementById("text");
  textDiv.classList.add("show");
  textDiv.innerHTML = "";
  let i = 0;
  function nextLine() {
    if (i < lines.length) {
      const p = document.createElement("p");
      textDiv.appendChild(p);
      typeEffect(p, lines[i], 40, () => {
        i++;
        nextLine();
      });
    }
  }
  nextLine();
}

// ====== Click nổ tim ======
document.addEventListener("click", function(e){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
});
</script>

</body>
</html>
