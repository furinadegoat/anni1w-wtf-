<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3 Pink Cinematic</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    overflow:hidden;
    background:black;
    color:white;
}

/* ===== SCENE CHUNG ===== */
.scene{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:opacity 1s ease;
}

.active{
    opacity:1;
    z-index:1;
}

/* ===== SCENE 1 ===== */
#scene1{
    background: radial-gradient(circle at center,
      #ff66b2 0%,
      #ff1a8c 40%,
      #cc0066 70%,
      #1a0010 100%);
}

.title{
    font-size:60px;
    text-shadow:
      0 0 10px #ff99cc,
      0 0 20px #ff4da6,
      0 0 40px #ff0066;
}

/* ===== SCENE 2 ===== */
#scene2{
    background: radial-gradient(circle at center,
      #ff4da6 0%,
      #99004d 60%,
      #0d001a 100%);
}

/* ===== SCENE 3 ===== */
#scene3{
    background: radial-gradient(circle at center,
      #ff99cc 0%,
      #cc0066 60%,
      #1a0010 100%);
}

/* ===== PARTICLES ===== */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:#ff99cc;
    border-radius:50%;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{ transform:translateY(100vh); opacity:0;}
    to{ transform:translateY(-10vh); opacity:1;}
}

/* ===== HEART ===== */
.heart{
    width:150px;
    height:150px;
    position:relative;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:150px;
    height:150px;
    background:#ff4da6;
    border-radius:50%;
    box-shadow:0 0 40px #ff0066;
}

.heart:before{
    top:-75px;
    left:0;
}

.heart:after{
    left:75px;
    top:0;
}

@keyframes beat{
    0%,100%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.1);}
}

/* ===== RADIAL BURST TRANSITION ===== */
.burst{
    position:fixed;
    width:100px;
    height:100px;
    border-radius:50%;
    background: radial-gradient(circle,
      #ff99cc 0%,
      #ff0066 40%,
      #33001a 80%);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    z-index:999;
    pointer-events:none;
}

.expand{
    animation:expand 1s forwards;
}

@keyframes expand{
    to{
        transform:translate(-50%,-50%) scale(20);
    }
}

.text{
    margin-top:30px;
    font-size:22px;
    text-align:center;
    max-width:80%;
    text-shadow:0 0 20px #ff4da6;
}

</style>
</head>
<body>

<div class="scene active" id="scene1">
    <div class="title">8.3.2026</div>
</div>

<div class="scene" id="scene2">
    <div class="text">Trong hàng tỷ người trên thế giới...</div>
</div>

<div class="scene" id="scene3">
    <div class="heart"></div>
    <div class="text">
        Nhưng hôm nay, thế giới chọn em.<br>
        Chúc em 8/3 thật hạnh phúc 💖
    </div>
</div>

<div class="burst" id="burst"></div>

<script>

const scenes = document.querySelectorAll(".scene");
const burst = document.getElementById("burst");

function transition(nextIndex){
    burst.classList.add("expand");
    setTimeout(()=>{
        scenes.forEach(s=>s.classList.remove("active"));
        scenes[nextIndex].classList.add("active");
        burst.classList.remove("expand");
    },1000);
}

setTimeout(()=> transition(1), 2500);
setTimeout(()=> transition(2), 6000);

/* PARTICLES */
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

</script>

</body>
</html>
