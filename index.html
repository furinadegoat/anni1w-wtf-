<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:sans-serif;background:black;color:white}

/* ===== SCENES ===== */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#scene1{
  background:radial-gradient(circle,#ff4da6,#b30059);
  font-size:40px;
  letter-spacing:5px;
}

#scene2{
  background:radial-gradient(circle at center,#ff99cc,#660033);
  opacity:0;
  transition:1s;
}

#scene3{
  background:black;
  opacity:0;
  transition:1s;
}

/* ===== BURST EFFECT ===== */
#burst{
  position:absolute;
  width:0;
  height:0;
  border-radius:50%;
  background:#ff4da6;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

/* ===== HEART CANVAS ===== */
canvas{position:absolute;top:0;left:0}

#finalText{
  position:absolute;
  bottom:20%;
  font-size:32px;
  text-align:center;
  opacity:0;
  transition:2s;
}
</style>
</head>

<body>

<div id="scene1" class="scene">
  8.3.2026
</div>

<div id="burst"></div>

<div id="scene2" class="scene">
  <canvas id="stars"></canvas>
  <h1 style="font-size:36px;">Trong hàng tỷ người trên thế giới...</h1>
</div>

<div id="scene3" class="scene">
  <canvas id="heartCanvas"></canvas>
  <div id="finalText">
    Nhưng hôm nay, thế giới chọn em 💖<br>
    Chúc em 8/3 thật hạnh phúc.
  </div>
</div>

<script>
/* ===== SCENE TRANSITION ===== */
setTimeout(()=>{
  const burst=document.getElementById("burst");
  burst.style.width="200vmax";
  burst.style.height="200vmax";
  burst.style.transition="1s ease-out";

  setTimeout(()=>{
    document.getElementById("scene1").style.display="none";
    document.getElementById("scene2").style.opacity=1;
  },900);
},2000);

/* ===== SCENE 2 AUTO TO SCENE 3 ===== */
setTimeout(()=>{
  document.getElementById("scene2").style.opacity=0;
  setTimeout(()=>{
    document.getElementById("scene2").style.display="none";
    document.getElementById("scene3").style.opacity=1;
    startHeart();
  },1000);
},6000);

/* ===== PINK PARTICLES ===== */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#ff4da6";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ===== HEART FORMATION ===== */
function startHeart(){
  const c=document.getElementById("heartCanvas");
  const hctx=c.getContext("2d");
  c.width=innerWidth;
  c.height=innerHeight;

  let points=[];
  for(let t=0;t<Math.PI*2;t+=0.05){
    let x=16*Math.pow(Math.sin(t),3);
    let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    points.push({
      x:c.width/2+x*20,
      y:c.height/2-y*20
    });
  }

  let scale=1;
  function drawHeart(){
    hctx.clearRect(0,0,c.width,c.height);
    hctx.fillStyle="#ff4da6";
    hctx.shadowColor="#ff4da6";
    hctx.shadowBlur=30;

    points.forEach(p=>{
      hctx.beginPath();
      hctx.arc(p.x,p.y,3*scale,0,Math.PI*2);
      hctx.fill();
    });

    scale=1+0.1*Math.sin(Date.now()/300);
    requestAnimationFrame(drawHeart);
  }
  drawHeart();

  setTimeout(()=>{
    document.getElementById("finalText").style.opacity=1;
  },2000);
}
</script>

</body>
</html>
